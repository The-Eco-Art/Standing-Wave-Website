        <script>
            // Theme toggle
            const themes = ["dark", "light", "warm", "ocean"];
            function toggleTheme() {
                const html = document.documentElement;
                const current = html.getAttribute("data-theme") || "dark";
                const idx = themes.indexOf(current);
                const next = themes[(idx + 1) % themes.length];
                html.setAttribute("data-theme", next);
                localStorage.setItem("theme", next);
            }
            // Load saved theme
            const saved = localStorage.getItem("theme");
            if (saved)
                document.documentElement.setAttribute("data-theme", saved);

            // Copy prompt function (defined here to avoid script tags inside templates)
            function copyPrompt() {
                const text = document
                    .getElementById("swfPromptText")
                    .textContent.trim();
                navigator.clipboard.writeText(text).then(() => {
                    const btn = document.getElementById("copyPromptBtn");
                    btn.textContent = "Copied";
                    btn.style.background = "rgba(64, 224, 208, 0.3)";
                    setTimeout(() => {
                        btn.textContent = "Copy Prompt";
                        btn.style.background = "rgba(64, 224, 208, 0.15)";
                    }, 2000);
                });
            }
        </script>
